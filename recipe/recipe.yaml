context:
  version: "2.14.0"

package:
  name: eon
  version: ${{ version }}

source:
  - url: https://github.com/TheochemUI/eOn/releases/download/v${{ version }}/eon-v${{ version }}.tar.xz
    sha256: 3ac43fa2037a46bcc09e727647db504dd5ac55d4b7627f56d3a5ad6be38f765d
    # fix_vesin_const.patch landed upstream for v2.14.0 and is no longer needed.
  - url: https://github.com/OmniPotentRPC/rgpot/archive/refs/tags/v1.0.3.tar.gz
    sha256: b46d9d6ecb0d47c621d7ec6051c19025d3254b366d4c98232168f74b75c0f7da
    target_directory: subprojects/rgpot
    patches:
      - fix_capnpc.patch

build:
  number: 0
requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - if: not win
      then: ${{ compiler('fortran') }}
    # readcon-core is a Rust meson subproject since eon v2.13; its meson.build
    # demands rustc plus cbindgen to generate the C header that ConFileIO.cpp
    # consumes. Missing either one aborts meson setup before any C++
    # translation unit is touched. conda-forge publishes no cbindgen binary
    # for any subdir, so build.sh and build.bat both bootstrap it via
    # `cargo install`, matching the ensure_cbindgen fallback in pixi.toml.
    - ${{ compiler('rust') }}
    # Required by conda-forge policy for Rust packages: bundle the licenses
    # of every transitive Rust dependency into THIRDPARTY.yml.
    - cargo-bundle-licenses
    - cmake
    - ninja
    - meson
    - pkg-config
    - sccache
    - if: (build_platform != target_platform)
      then:
        - python
        - cross-python_${{ target_platform }}
    - capnproto
    - if: osx
      then: llvm-openmp
  host:
    - python
    - pip
    - numpy
    - pyyaml
    - setuptools
    # build against CPU, CUDA at runtime
    # with linker trick
    - libtorch *cpu*
    - libtorch
    - libmetatomic-torch >=0.1.7,<0.2
    - libmetatensor
    - libmetatensor-torch >=0.8,<0.9
    - xtb
    - eigen >=3.4,<3.5
    - if: win
      then:
        - libblas * *mkl
        - libcblas * *mkl
        - liblapack * *mkl
        - liblapacke * *mkl
    - if: not win
      then:
        - libblas
        - libcblas
        - liblapack
        - liblapacke
    - quill
    - capnproto
    - if: osx
      then: llvm-openmp
  run:
    - python
    - pyyaml
    - numpy
    - xtb
    - quill
    - capnproto
    - libmetatomic-torch >=0.1.7,<0.2
    - libmetatensor-torch
    - if: osx
      then: llvm-openmp

tests:
  - if: (build_platform == target_platform)
    then:
      script:
        - python -c "import eon"
      requirements:
        run:
          - libtorch *cpu*
  - if: (build_platform == target_platform)
    then:
      script:
        - eonclient -h
        - eonclient --version
      requirements:
        run:
          - libtorch *cpu*


about:
  homepage: https://eondocs.org/
  license: BSD-3-Clause
  license_file:
    - LICENSE
    # Bundled licenses for every Rust crate transitively pulled in by
    # readcon-core; generated by cargo-bundle-licenses in build.sh /
    # build.bat after the meson subproject download.
    - subprojects/readcon-core/THIRDPARTY.yml
  summary: "Algorithms for long time scales and potential energy surface exploration"
  description: |
    The EON software package contains algorithms used primarily to model the
    evolution of atomic scale systems over long time scales. This version is
    built with metatomic, xtb, and serve mode support.
  documentation: https://eondocs.org/index.html
  repository: https://github.com/TheochemUI/eOn

extra:
  recipe-maintainers:
    - HaoZeke
